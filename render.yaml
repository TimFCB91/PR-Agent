# Render Blueprint — one-click deploy of PR-Agent (app + PostgreSQL) in the EU.
#
# How to use:
#   1. Push this repo to GitHub (done).
#   2. On render.com: New → Blueprint → connect this repo.
#   3. Render reads this file and creates the web service + a Postgres database
#      in Frankfurt (EU). It generates AUTH_SECRET automatically.
#   4. You only enter ANTHROPIC_API_KEY (marked sync:false) in the dashboard.
#   5. Open the generated URL and register your organisation at /register.
#
# Note: no SEED_DEMO here, so production starts EMPTY (no demo logins).

services:
  - type: web
    name: pr-agent
    runtime: docker
    region: frankfurt
    plan: starter # paid, does not sleep; use "free" to try (sleeps after idle)
    dockerfilePath: ./Dockerfile
    healthCheckPath: /login
    # Deploy the working branch (where the full app lives). autoDeploy:true means
    # every push here goes live automatically — handy while iterating.
    branch: claude/pr-agent-saas-foundation-64ch1g
    autoDeploy: true
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: pr-agent-db
          property: connectionString
      - key: AUTH_SECRET
        generateValue: true
      - key: AUTH_TRUST_HOST
        value: "true"
      - key: AI_MODE
        value: real
      - key: AI_PROVIDER
        value: anthropic
      # Enter your Anthropic key in the Render dashboard (kept secret).
      - key: ANTHROPIC_API_KEY
        sync: false
      # Optional, cheaper/faster than the default claude-opus-4-8:
      # - key: AI_MODEL
      #   value: claude-sonnet-4-6

databases:
  - name: pr-agent-db
    region: frankfurt
    plan: basic-256mb # smallest paid plan; "free" expires after 30 days
    postgresMajorVersion: "16"
